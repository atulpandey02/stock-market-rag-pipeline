name: Stock Market Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 src/ --max-line-length=120 --exclude=__pycache__

      - name: Check black formatting
        run: |
          black --check src/

      - name: Check import ordering
        run: |
          isort --check-only src/

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # ── Job 3: dbt Validation ────────────────────────────────────────────────────
  dbt-validate:
    name: dbt Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: |
          pip install dbt-snowflake

      - name: dbt compile check
        working-directory: src/dbt
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE:  ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          dbt compile --profiles-dir . --project-dir .

      - name: dbt docs generate
        working-directory: src/dbt
        run: |
          dbt docs generate --profiles-dir . --project-dir .

  # ── Job 4: Docker Build Check ────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          docker compose config

      - name: Build images
        run: |
          docker compose build --no-cache

  # ── Job 5: DAG Validation ────────────────────────────────────────────────────
  airflow-dag-validation:
    name: Airflow DAG Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Airflow
        run: |
          pip install apache-airflow==2.9.3

      - name: Validate DAG syntax
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, 'src/airflow/dags')
          dag_files = [
              'stock_market_batch_dag.py',
              'stock_market_stream_dag.py'
          ]
          for dag_file in dag_files:
              path = f'src/airflow/dags/{dag_file}'
              if os.path.exists(path):
                  with open(path) as f:
                      compile(f.read(), path, 'exec')
                  print(f'✓ {dag_file} syntax OK')
          "

      - name: Check DAG imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src/airflow/dags')
          from stock_market_batch_dag import dag as batch_dag
          from stock_market_stream_dag import dag as stream_dag
          print(f'✓ batch DAG tasks: {len(batch_dag.tasks)}')
          print(f'✓ stream DAG tasks: {len(stream_dag.tasks)}')
          "

  # ── Job 6: Integration (on main only) ───────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, dbt-validate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v
        env:
          KAFKA_BOOTSTRAP_SERVER: localhost:29092
          MINIO_ENDPOINT:         localhost:9000